version: "3.8"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=moto_user
      - POSTGRES_PASSWORD=moto_password
      - POSTGRES_DB=moto_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moto_user -d moto_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://moto_user:moto_password@db:5432/moto_db?schema=public
      - JWT_SECRET=motobook_super_secret_jwt_key_2024
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
